site_name: Starches Documentation
site_description: Documentation for publishing Arches cultural heritage data as static websites
site_url: https://flaxandteal.github.io/starches-docs/
repo_url: https://github.com/flaxandteal/starches

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Templates: templates.md
  - Data Pipeline: data-pipeline.md
  - Customization: customization.md
  - Development: development.md
  - Deployment: deployment.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - admonition
  - toc:
      permalink: true
